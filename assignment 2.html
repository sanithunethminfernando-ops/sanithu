<!DOCTYPE html>
<html>
<head>
    <title>Basic Turtle Graphics</title>
    <style>
        #floor {
            display: grid;
            grid-template-columns: repeat(50, 10px);
            width: 500px;
        }

        .cell {
            width: 10px;
            height: 10px;
            border: 1px solid #eee;
        }

        .draw {
            background-color: black;
        }

        .turtle {
            background-color: red;
        }
    </style>
</head>
<body>

<h2>Turtle Graphics</h2>

<p>
Use the buttons to move the turtle.<br>
Click "Pen Down" to start drawing.
</p>

<button onclick="move('up')">Up</button>
<button onclick="move('down')">Down</button>
<button onclick="move('left')">Left</button>
<button onclick="move('right')">Right</button>
<button onclick="togglePen()">Pen Up / Down</button>
<button onclick="reset()">Reset</button>

<div id="floor"></div>

<script>
    const size = 50;
    const floor = document.getElementById("floor");

    let penDown = false;
    let x = 0;
    let y = 0;

    let cells = [];

    // Create grid
    for (let i = 0; i < size * size; i++) {
        let div = document.createElement("div");
        div.className = "cell";
        floor.appendChild(div);
        cells.push(div);
    }

    function index(x, y) {
        return y * size + x;
    }

    function drawTurtle() {
        cells.forEach(c => c.classList.remove("turtle"));
        cells[index(x, y)].classList.add("turtle");
    }

    function move(direction) {
        if (direction === "up" && y > 0) y--;
        if (direction === "down" && y < size - 1) y++;
        if (direction === "left" && x > 0) x--;
        if (direction === "right" && x < size - 1) x++;

        if (penDown) {
            cells[index(x, y)].classList.add("draw");
        }

        drawTurtle();
    }

    function togglePen() {
        penDown = !penDown;
    }

    function reset() {
        cells.forEach(c => {
            c.classList.remove("draw");
            c.classList.remove("turtle");
        });
        x = 0;
        y = 0;
        penDown = false;
        drawTurtle();
    }

    drawTurtle();
</script>

</body>
</html>
